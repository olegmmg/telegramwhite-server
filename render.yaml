services:
  - type: web
    name: telegramwhite-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: TW_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: telegramwhite-db
          property: connectionString

databases:
  - name: telegramwhite-db
    plan: free
