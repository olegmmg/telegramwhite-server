services:
  - type: web
    name: combined-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python render-combined.py
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: your-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: FIREBASE_SECRET
        sync: false
